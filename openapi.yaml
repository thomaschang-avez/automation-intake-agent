openapi: 3.0.0
info:
  title: Automation Intake Agent
  version: 1.0.0
  description: Processes automation requests from Glean conversational forms

servers:
  - url: https://your-deployment-url.example.com
    description: Railway production server

paths:
  /execute:
    post:
      summary: Process automation intake request
      description: Receives conversation from Glean Custom Action and creates Asana task
      operationId: processAutomationRequest
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - User_message
              properties:
                User_message:
                  type: string
                  description: Full conversation text from Glean Agent containing all 19 fields
      responses:
        '200':
          description: Task created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: "✅ Automation request submitted!"
                  task_url:
                    type: string
                    example: "https://app.asana.com/0/YOUR_PROJECT_GID/1234567890"
                  task_gid:
                    type: string
                    example: "1234567890"
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: error
                  message:
                    type: string
        '500':
          description: Server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: error
                  message:
                    type: string